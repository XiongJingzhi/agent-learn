# ============================================
# Kubernetes 完整部署示例
# ============================================

# 1. Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: agent-prod
  labels:
    name: agent-prod
    environment: production

---

# 2. ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-config
  namespace: agent-prod
data:
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  DATABASE_HOST: "postgres-service"
  DATABASE_PORT: "5432"

---

# 3. Secret
apiVersion: v1
kind: Secret
metadata:
  name: agent-secret
  namespace: agent-prod
type: Opaque
stringData:
  DATABASE_URL: "postgresql://agent:agent123@postgres-service:5432/agentdb"
  REDIS_PASSWORD: "redis123"
  OPENAI_API_KEY: "sk-xxxxx"
  JWT_SECRET: "your-jwt-secret-key"

---

# 4. Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-deployment
  namespace: agent-prod
  labels:
    app: agent
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
        version: v1
    spec:
      # 安全上下文
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # 容器配置
      containers:
      - name: agent
        image: your-registry/agent:latest
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 8000
          protocol: TCP

        # 环境变量
        env:
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: LOG_LEVEL
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: agent-secret
              key: DATABASE_URL
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: agent-secret
              key: OPENAI_API_KEY

        # 资源限制
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        # 健康检查
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3

        # 启动探针
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 30

        # 卷挂载
        volumeMounts:
        - name: cache
          mountPath: /app/cache
        - name: logs
          mountPath: /app/logs

      # 卷定义
      volumes:
      - name: cache
        emptyDir:
          sizeLimit: 100Mi
      - name: logs
        emptyDir:
          sizeLimit: 200Mi

      # 亲和性
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - agent
              topologyKey: kubernetes.io/hostname

---

# 5. Service (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: agent-prod
  labels:
    app: agent
spec:
  type: ClusterIP
  selector:
    app: agent
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: http
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---

# 6. Service (LoadBalancer - 可选)
apiVersion: v1
kind: Service
metadata:
  name: agent-lb
  namespace: agent-prod
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:..."
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
spec:
  type: LoadBalancer
  selector:
    app: agent
  ports:
  - name: http
    port: 80
    targetPort: http
  - name: https
    port: 443
    targetPort: http

---

# 7. Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-ingress
  namespace: agent-prod
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - api.example.com
    secretName: agent-tls
  rules:
  - host: api.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agent-service
            port:
              number: 80

---

# 8. HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-hpa
  namespace: agent-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max

---

# 9. PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: agent-pdb
  namespace: agent-prod
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: agent

---

# 10. ResourceQuota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: agent-quota
  namespace: agent-prod
spec:
  hard:
    requests.cpu: "2"
    requests.memory: "4Gi"
    limits.cpu: "4"
    limits.memory: "8Gi"
    persistentvolumeclaims: "2"
  scopeSelector:
    matchExpressions:
    - operator: In
      scopeName: PriorityClass
      values:
      - high-priority

---

# 11. LimitRange
apiVersion: v1
kind: LimitRange
metadata:
  name: agent-limits
  namespace: agent-prod
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    type: Container

---

# 12. NetworkPolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-network-policy
  namespace: agent-prod
spec:
  podSelector:
    matchLabels:
      app: agent
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
    - protocol: TCP
      port: 6379  # Redis
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443  # HTTPS

---

# 13. ServiceMonitor (Prometheus Operator)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: agent-servicemonitor
  namespace: agent-prod
  labels:
    app: agent
spec:
  selector:
    matchLabels:
      app: agent
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s

---

# 14. PodMonitor (Prometheus Operator)
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: agent-podmonitor
  namespace: agent-prod
  labels:
    app: agent
spec:
  selector:
    matchLabels:
      app: agent
  podMetricsEndpoints:
  - port: http
    path: /metrics
    interval: 30s

---

# 部署脚本
---
# deploy.sh
#!/bin/bash

set -e

NAMESPACE="agent-prod"
REGISTRY="your-registry"
IMAGE_NAME="agent"
IMAGE_TAG="${1:-latest}"

echo "Deploying to namespace: $NAMESPACE"

# 构建镜像
echo "Building Docker image..."
docker build -t $REGISTRY/$IMAGE_NAME:$IMAGE_TAG .

# 推送镜像
echo "Pushing Docker image..."
docker push $REGISTRY/$IMAGE_NAME:$IMAGE_TAG

# 应用配置
echo "Applying Kubernetes manifests..."
kubectl apply -f deployment.yaml

# 等待部署完成
echo "Waiting for deployment to complete..."
kubectl rollout status deployment/agent-deployment -n $NAMESPACE

# 查看状态
echo "Deployment status:"
kubectl get pods -n $NAMESPACE
kubectl get services -n $NAMESPACE

echo "Deployment completed successfully!"
echo "Service URL:"
kubectl get ingress agent-ingress -n $NAMESPACE -o jsonpath='{.spec.rules[0].host}'
